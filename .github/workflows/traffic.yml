name: Daily traffic analysis

# Pulls Cloudflare Web Analytics page-view counts, ranks content categories by
# traffic, and commits the report to traffic-report.txt. A separate daily Claude
# routine reads that report and expands the highest-traffic category.

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC daily (after the prior day's traffic is in)
  workflow_dispatch: {}    # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run traffic analysis
        env:
          CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
        run: |
          python3 analyze_traffic.py 7 > traffic-report.txt 2>&1 || true
          echo "" >> traffic-report.txt
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> traffic-report.txt
          cat traffic-report.txt
      - name: Commit report
        run: |
          git config user.name "traffic-bot"
          git config user.email "traffic-bot@users.noreply.github.com"
          git add traffic-report.txt
          git commit -m "Daily traffic report ($(date -u +%Y-%m-%d))" || echo "no change"
          git push || echo "nothing to push"
