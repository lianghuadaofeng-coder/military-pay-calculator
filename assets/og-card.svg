<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2545"/>
      <stop offset="1" stop-color="#13315c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#c9a227"/>
  <rect x="0" y="622" width="1200" height="8" fill="#c9a227"/>

  <!-- star seal -->
  <g transform="translate(96,96)">
    <circle cx="0" cy="0" r="52" fill="none" stroke="#c9a227" stroke-width="4"/>
    <path fill="#c9a227" d="M0 -34l10.4 21.1 23.3 3.4-16.8 16.4 4 23.2L0 22.6l-20.9 11 4-23.2-16.8-16.4 23.3-3.4z"/>
  </g>

  <!-- 2026 badge -->
  <g transform="translate(180,72)">
    <rect x="0" y="0" rx="22" width="150" height="44" fill="#c9a227"/>
    <text x="75" y="30" font-size="24" font-weight="700" fill="#23210b" text-anchor="middle">2026 RATES</text>
  </g>

  <!-- title -->
  <text x="96" y="250" font-size="78" font-weight="800" fill="#ffffff">U.S. Military Pay</text>
  <text x="96" y="338" font-size="78" font-weight="800" fill="#ffffff">Calculator</text>

  <!-- subtitle -->
  <text x="98" y="402" font-size="33" fill="#c7d2e3">Active Duty &amp; Reserve  ·  Basic Pay  ·  BAH by ZIP  ·  Take-Home</text>

  <!-- feature chips -->
  <g font-size="26" font-weight="700">
    <g transform="translate(96,448)"><rect rx="10" width="232" height="52" fill="#ffffff" opacity="0.08"/><text x="116" y="34" fill="#e6ebf2" text-anchor="middle">Taxes · TSP · SGLI</text></g>
    <g transform="translate(344,448)"><rect rx="10" width="250" height="52" fill="#ffffff" opacity="0.08"/><text x="125" y="34" fill="#e6ebf2" text-anchor="middle">Drill Pay &amp; Points</text></g>
    <g transform="translate(610,448)"><rect rx="10" width="210" height="52" fill="#ffffff" opacity="0.08"/><text x="105" y="34" fill="#e6ebf2" text-anchor="middle">Free · No login</text></g>
  </g>

  <!-- domain -->
  <text x="96" y="566" font-size="40" font-weight="800" fill="#c9a227">militarypaytool.com</text>
</svg>
